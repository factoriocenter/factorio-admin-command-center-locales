facc-stats-hud-show-vehicle-fuel=统计HUD：显示车辆/平台燃料
facc-stats-hud-offset-preset-one-info=统计 HUD 偏移预设：1 条信息行
facc-stats-hud-offset-preset-two-infos=统计 HUD 偏移预设：2 条信息行
