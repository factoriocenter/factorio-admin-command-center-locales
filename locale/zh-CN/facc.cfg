auto-clean-pollution=以固定间隔自动清理污染。\n[color=orange]单位为秒。[/color]
reveal-map=在设定半径内揭示玩家周围的所有区域。
remove-cliffs=在设定半径内摧毁所有悬崖。
add-robots=在库存中插入 50 个建筑机器人和 50 个物流机器人。\n[color=orange]安装并启用 [font=default-bold]Quality[/font] 扩展包后，机器人将始终为传奇品质。[/color]
increase-robot-speed=根据滑块值调整工作机器人速度提升倍率。
set-crafting-speed=根据滑块值调整制造速度提升倍率。
toggle-minable=在可采和不可采状态之间切换所有实体。
set-mining-speed=根据滑块值调整采矿速度提升倍率。
regenerate-resources=在地表再生所有有限资源并重置采矿。\n[color=red][font=default-bold]在非常大的地图上，此功能可能暂时冻结游戏。请稍候——游戏将会恢复并继续正常运行！[/font][/color]
increase-resources=将所有资源数量设置为最大值。
generate-planet-surfaces=创建行星表面并绘制 150×150 的中央区域。\n[color=orange]需要安装并启用 [font=default-bold]Space Age[/font] 扩展包。[/color]
teleport-to-planet=Teleports you to the selected planet.
tp-open=打开一个专用的快速传送窗口，其中混合了手动保存的点和强制贴图标签。\n保存的点在列表标签​​中保留坐标（例如：名称 (X,Y)），而编辑时仅保留自定义名称。
recharge-energy=为机器、蓄电池和设备网格补充能量。\n[color=red][font=default-bold]在非常大的地图上，此功能可能暂时冻结游戏。请稍候——游戏将会恢复并继续正常运行！[/font][/color]
trains-auto-mode=切换所有火车至自动或手动模式。
platform-distance=通过滑块调整太空平台的对接距离。\n[color=orange]需要安装并启用 [font=default-bold]Space Age[/font] 扩展包。[/color]
fill-thrusters=为当前太空平台上的所有推进器填充所需燃料和氧化剂。\n[color=orange]需要已安装并启用 [font=default-bold]太空时代[/font] 扩展。[/color]
high_infinite_research_levels=将所有无限研究科技设置为 100 级
add_infinite_research_levels=每次使用时，为每项已配置的无限研究技术增加 100 级。
instant-blueprint-building=放置后立即复活实体和图块的幽灵。\n在普通角色（非编辑器）下也可工作，且不消耗物品。
instant-deconstruction=当实体被标记为拆除时，立即将其移除。\n优先尝试采掘；若无法采掘，则摧毁该实体。
instant-upgrading=立即应用已标记的升级。
instant-rail-planner=仅在“即时蓝图建造”为关闭时，复活由铁路规划器放置的轨道幽灵。
ghost-mode=启用无碰撞角色，可穿过实体。再次切换可恢复正常。
invincible-player=你的角色将忽略所有伤害。\n[color=orange]需要角色实体。在上帝模式、编辑器模式或重生前不可用。[/color]
repair-mined-item=在开采实体之前将其修复至完全健康状态。
instant-request=启用后，根据激活的个人物流请求设置，自动将你的库存补满到最小数量。
instant-trash=删除垃圾槽中的物品，而不是派机器人去取回。库存满时非常好用。
indestructible-builds_permanent=使当前所有建筑在所有地表上不可摧毁。永久。
non-minable-permanent=使当前所有建筑在所有地表上不可采集。永久。

