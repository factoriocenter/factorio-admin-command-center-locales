[mod-setting-description]
facc-stats-hud-enabled=Shows a lightweight HUD with live gameplay stats.

facc-stats-hud-adjust-for-fps-ups=Stats HUD: adjust for FPS/UPS indicator
facc-stats-hud-adjust-for-clock=Stats HUD: adjust for clock
facc-stats-hud-show-research-eta=Shows estimated time remaining for the current force research.
facc-stats-hud-show-coordinates=Shows your current X and Y position.
facc-stats-hud-show-distance-from-point=Shows distance from a custom point configured below.
facc-stats-hud-distance-origin-x=Reference point X coordinate used by the distance sensor.
facc-stats-hud-distance-origin-y=Reference point Y coordinate used by the distance sensor.
facc-stats-hud-show-evolution=Shows current enemy evolution factor for your surface.
facc-stats-hud-show-pollution=Shows pollution at your current position.
facc-stats-hud-show-playtime=Shows total save playtime.
facc-stats-hud-show-playtime-days=When enabled, playtime is shown as days + time.
facc-stats-hud-show-daytime=Shows current surface time and day count.
facc-stats-hud-show-movement-speed=Shows your movement speed (on foot or in vehicle).
facc-stats-hud-show-player-max-speed=When on foot, also shows calculated player max speed.
facc-stats-hud-show-vehicle-max-speed=When in vehicle, also shows calculated vehicle max speed.


facc-stats-hud-offset-preset-one-info=Stats HUD offset preset: 1 info line
facc-stats-hud-offset-preset-two-infos=Stats HUD offset preset: 2 info lines
facc-stats-hud-offset-preset-three-infos=Stats HUD offset preset: 3 info lines
facc-stats-hud-offset-preset-one-info=Preset vertical offset for when only 1 top-right game info line is visible (uses offset 22).
facc-stats-hud-offset-preset-two-infos=Preset vertical offset for when 2 top-right game info lines are visible (uses offset 39).
facc-stats-hud-offset-preset-three-infos=Preset vertical offset for when 3 top-right game info lines are visible (uses offset 60).