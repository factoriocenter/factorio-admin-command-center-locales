[mod-setting-description]
facc-show-cheat-tab=启用制作菜单中的作弊工具制作选项卡
facc-internal-names=使用内部标识符和详细信息覆盖每个原型的本地化名称
facc-enable-achievement-overrides=启用后，将绕过内置成就限制
facc-infinite-resources=启用后，所有资源都会像 Satisfactory 一样无限，并且始终以正常的完整数量生成。\n\n[font=default-bold][color=red]警告：[/color]\n[color=orange]启用或禁用此选项会重新加载并恢复地图上的所有资源。[/color]\n[color=red]在大型地图上，更改此设置后首次加载可能需要几分钟。请稍候 — 游戏将正常恢复。为了避免重复长时间加载，请在启用或禁用此选项后保存游戏。[/color][/font]
facc-infinite-resources-multiplier-solid=确定固体类别（例如基本固体、硬固体和其他非流体类型）中无限资源的乘数。影响丰富度和充值量。\n1× = 100%\n2× = 200%\n5× = 500%\n10× = 1000%\n20× = 2000%\n50× = 5000%
facc-infinite-resources-multiplier-fluid=确定流体类别（例如基本流体和修改流体类别）中无限资源的乘数。影响丰富度和充值金额。如果类别名称包含“流体”或资源产生流体，则修改后的类别将被视为流体。\n1× = 100%\n2× = 200%\n5× = 500%\n10× = 1000%\n20× = 2000%\n50× = 5000%
facc-enable-auto-resource-regeneration=启用后，在切换（激活然后停用）无限资源设置时自动重新生成有限资源。无论如何，始终可以通过管理 GUI 中的“重新生成资源”按钮进行手动重新生成。\n[color=green]地图设置：无需重新启动游戏。[/color]\n[color=red][font=default-bold]警告：[/font][/color]\n[color=orange]不建议与无限同时启用此设置资源。[/color]\n[color=red]为了获得最佳效果，请使用其中之一 - 切勿同时启用。[/color]\n[color=green]保持禁用状态也是安全且受支持的。[/color]
facc-instant-mining-drills=将每个采矿钻机的采矿速度乘以一个巨大的系数。
facc-instant-crafting-machines=使制作速度成倍增加，因此食谱可以立即完成。
facc-enable-background-optimization=[font=default-bold]默认：[/font]关闭。\n[color=green]地图设置：无需重新启动游戏。[/color]\n\n[color=green][font=default-bold]开启（优化处理）：[/font][/color]\n在后台处理繁重的操作以避免大画面冻结\n[color=green]优点：[/color]游戏更流畅，大地图更安全。\n[color=yellow]缺点：[/color]完全完成可能需要更长的时间。\n\n[color=orange][font=default-bold]关闭（即时处理）：[/font][/color]\n 立即一次性运行所有内容。\n[color=green] 优点：[/color] 在小型保存时最快完成。\n[color=red] 缺点：[/color] 在大型保存时可能会冻结/卡顿。
facc-stats-hud-enabled=显示带有实时游戏统计数据的轻量级 HUD。
facc-stats-hud-single-line=在一根水平线上显示所有启用的 HUD 传感器。对于垂直堆叠线禁用。
facc-stats-hud-adjust-for-fps-ups=Stats HUD: adjust for FPS/UPS indicator
facc-stats-hud-adjust-for-clock=Stats HUD: adjust for clock
facc-stats-hud-show-research-eta=显示当前部队研究的预计剩余时间。
facc-stats-hud-show-coordinates=显示您当前的 X 和 Y 位置。
facc-stats-hud-show-distance-from-point=显示距下面配置的自定义点的距离。
facc-stats-hud-distance-origin-x=距离传感器使用的参考点 X 坐标。
facc-stats-hud-distance-origin-y=距离传感器使用的参考点 Y 坐标。
facc-stats-hud-show-evolution=显示您表面当前敌人的进化因素。
facc-stats-hud-show-pollution=显示您当前位置的污染情况。
facc-stats-hud-show-playtime=显示总保存游戏时间。
facc-stats-hud-show-playtime-days=启用后，游戏时间显示为天 + 时间。
facc-stats-hud-show-daytime=显示当前水面时间和天数。
facc-stats-hud-show-movement-speed=显示您的移动速度（步行或乘车）。
facc-stats-hud-show-player-max-speed=步行时，还显示计算出的玩家最大速度。
facc-stats-hud-show-vehicle-max-speed=在车辆中时，还显示计算出的车辆最大速度。
facc-stats-hud-show-handcraft-timer=显示剩余的手动制作队列时间。
facc-stats-hud-show-vehicle-fuel=显示车辆和平台推进剂（如果有）的估计燃料/能量。
facc-stats-hud-offset-preset-one-info=仅当右上角的 1 条游戏信息线可见时预设垂直偏移（使用偏移 22）。
facc-stats-hud-offset-preset-two-infos=当右上角的 2 条游戏信息线可见时预设垂直偏移（使用偏移 39）。
facc-stats-hud-offset-preset-three-infos=当右上角的 3 条游戏信息线可见时预设垂直偏移（使用偏移 60）。

