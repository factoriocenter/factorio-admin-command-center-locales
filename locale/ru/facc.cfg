facc-infinite-resources=Бесконечные ресурсы
facc-infinite-resources-multiplier-solid=Множитель бесконечных ресурсов (твёрдые)
facc-infinite-resources-multiplier-fluid=Множитель бесконечных ресурсов (жидкости)
facc-enable-auto-resource-regeneration=Включить автоматическую регенерацию ресурсов\n[color=green]Map setting: no game restart required.[/color]
facc-instant-mining-drills=Мгновенные буровые установки
facc-instant-crafting-machines=Мгновенные производственные машины
facc-enable-background-optimization=Enable background optimization for heavy actions

[mod-setting-description]
facc-show-cheat-tab=Отображает вкладку читов в меню создания предметов
facc-internal-names=Заменяет локализованное имя каждого прототипа на его внутренний идентификатор и детали
facc-enable-achievement-overrides=При включении игнорирует внутренние ограничения достижений
facc-infinite-resources=При включении все ресурсы становятся бесконечными, как в Satisfactory, и всегда появляются в полном нормальном количестве.\n\n[font=default-bold][color=red]Внимание:[/color]\n[color=orange]Включение или отключение этой опции перезагружает и восстанавливает все ресурсы карты.[/color]\n[color=red]На больших картах первая загрузка после изменения настройки может занять несколько минут. Просто подождите — игра возобновит работу нормально. Чтобы избежать повторных длительных загрузок, сохраните игру после изменения этой опции.[/color][/font]
facc-infinite-resources-multiplier-solid=Задаёт множитель для бесконечных ресурсов (твёрдые):\n1× = 100%\n2× = 200%\n5× = 500%\n10× = 1000%\n20× = 2000%\n50× = 5000%
facc-infinite-resources-multiplier-fluid=Задаёт множитель для бесконечных ресурсов (жидкости):\n1× = 100%\n2× = 200%\n5× = 500%\n10× = 1000%\n20× = 2000%\n50× = 5000%
facc-enable-auto-resource-regeneration=При включении автоматически регенерирует конечные ресурсы при переключении (сначала включении, затем выключении) настройки «Бесконечные ресурсы». Ручная регенерация через кнопку «Regenerate Resources» в админ-GUI всегда доступна независимо от этого.\n[color=red][font=default-bold]Предупреждение:[/font][/color]\n[color=orange]Не рекомендуется включать эту настройку одновременно с «Бесконечными ресурсами».[/color]\n[color=red]Для наилучших результатов используйте одну из опций — никогда обе сразу.[/color]\n[color=green]Обе опции, оставленные выключенными, также поддерживаются и безопасны.[/color]
facc-instant-mining-drills=Умножает скорость добычи каждой буровой установки на огромный коэффициент.
facc-instant-crafting-machines=Умножает скорость производства, чтобы рецепты выполнялись мгновенно.
facc-enable-background-optimization=[font=default-bold]Default:[/font] OFF.\n[color=green]Map setting: no game restart required.[/color]\n\n[color=green][font=default-bold]ON (Optimized processing):[/font][/color]\nProcesses heavy actions in the background to avoid freezes on large saves.\n[color=green]Pros:[/color] smoother gameplay, safer for big maps.\n[color=yellow]Cons:[/color] total completion may take a bit longer.\n\n[color=orange][font=default-bold]OFF (Instant processing):[/font][/color]\nRuns everything immediately in one go.\n[color=green]Pros:[/color] fastest completion on small saves.\n[color=red]Cons:[/color] may freeze/stutter on large saves.

