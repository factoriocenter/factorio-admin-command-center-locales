[mod-setting-description]
facc-show-cheat-tab=Включите вкладку «Cheat Tools» в меню крафта.
facc-internal-names=Переопределить локализованное имя каждого прототипа его внутренним идентификатором и сведениями.
facc-enable-achievement-overrides=Если эта функция включена, встроенные ограничения достижений обходятся.
facc-infinite-resources=При включении все ресурсы становятся бесконечными, как Satisfactory, и всегда появляются в полном нормальном количестве. \n\n[font=default-bold][color=red]Предупреждение: [/color]\n[color=orange]Включение или отключение этой опции перезагружает и восстанавливает все ресурсы на карте. [/color]\n[color=red]А на больших картах первая загрузка после изменение этой настройки может занять несколько минут. Просто подождите — игра возобновится в обычном режиме. Чтобы избежать повторных длительных загрузок, сохраните игру после включения или отключения этой опции.[/color][/font]
facc-infinite-resources-multiplier-solid=Определяет множитель для бесконечных ресурсов в твердых категориях (например, базовые-твердые, твердые и другие негибкие типы). Влияет на богатство и сумму пополнения. \n1× = 100%\n2× = 200%\n5× = 500%\n10× = 1000%\n20× = 2000%\n50× = 5000%
facc-infinite-resources-multiplier-fluid=Определяет множитель для бесконечных ресурсов в категориях жидкостей (например, категории базовой жидкости и модифицированной жидкости). Влияет на богатство и сумму пополнения. Модифицированные категории считаются текучими, если имя категории содержит слово «жидкость» или ресурс дает текучесть. \n1× = 100%\n2× = 200%\n5× = 500%\n10× = 1000%\n20× = 2000%\n50× = 5000%
facc-enable-auto-resource-regeneration=Если этот параметр включен, автоматически восстанавливает ограниченные ресурсы при переключении (при активации и последующем деактивировании) параметра «Бесконечные ресурсы». Ручная регенерация с помощью кнопки «Восстановить ресурсы» в графическом интерфейсе администратора всегда доступна независимо от этого. \n[color=green]Настройка карты: перезапуск игры не требуется. [/color]\n[color=red][font=default-bold]Предупреждение: [/font][/color]\n[color=orange]Не рекомендуется включать этот параметр одновременно с Infinite Ресурсы.[/color]\n[color=red]Для достижения наилучших результатов используйте один или другой — никогда не включайте оба одновременно.[/color]\n[color=green]Отключение обоих также безопасно и поддерживается.[/color]
facc-instant-mining-drills=Умножает скорость добычи каждого горного бура в огромный раз.
facc-instant-crafting-machines=Умножает скорость крафта, поэтому рецепты завершаются мгновенно.
facc-enable-background-optimization=[font=default-bold]По умолчанию:[/font] ВЫКЛ.\n[color=green]Настройка карты: перезапуск игры не требуется.[/color]\n\n[color=green][font=default-bold]ON (Оптимизированная обработка):[/font][/color]\nОбрабатывает тяжелые действия в фоновом режиме, чтобы избежать зависаний на больших сохраняет.\n[color=green]Плюсы:[/color] более плавный игровой процесс, безопаснее для больших карт.\n[color=yellow]Конс:[/color] полное прохождение может занять немного больше времени.\n\n[color=orange][font=default-bold]OFF (мгновенно) обработка):[/font][/color]\nЗапускает все сразу за один раз.\n[color=green]Плюсы:[/color] самое быстрое завершение при небольших сохранениях. \n[color=red]Минусы:[/color] может зависать/зависать при больших сохранениях.
facc-stats-hud-enabled=Показывает легкий HUD со статистикой игрового процесса в реальном времени.
facc-stats-hud-single-line=Показывает все включенные датчики HUD в одной горизонтальной строке. Отключить для вертикальных сложенных линий.
facc-stats-hud-adjust-for-fps-ups=Stats HUD: adjust for FPS/UPS indicator
facc-stats-hud-adjust-for-clock=Stats HUD: adjust for clock
facc-stats-hud-show-research-eta=Показывает расчетное время, оставшееся до текущего исследования силы.
facc-stats-hud-show-coordinates=Показывает вашу текущую позицию X и Y.
facc-stats-hud-show-distance-from-point=Показывает расстояние от пользовательской точки, настроенной ниже.
facc-stats-hud-distance-origin-x=Координата опорной точки X, используемая датчиком расстояния.
facc-stats-hud-distance-origin-y=Координата Y опорной точки, используемая датчиком расстояния.
facc-stats-hud-show-evolution=Показывает текущий коэффициент эволюции противника на вашей поверхности.
facc-stats-hud-show-pollution=Показывает загрязнение в вашем текущем положении.
facc-stats-hud-show-playtime=Показывает общее время сохранения.
facc-stats-hud-show-playtime-days=Если эта функция включена, время игры отображается в виде дней + время.
facc-stats-hud-show-daytime=Показывает текущее время на поверхности и количество дней.
facc-stats-hud-show-movement-speed=Показывает вашу скорость передвижения (пешком или на автомобиле).
facc-stats-hud-show-player-max-speed=Когда игрок идет пешком, также показывает расчетную максимальную скорость игрока.
facc-stats-hud-show-vehicle-max-speed=В автомобиле также отображается расчетная максимальная скорость автомобиля.
facc-stats-hud-show-handcraft-timer=Показывает оставшееся время в очереди на изготовление вручную.
facc-stats-hud-show-vehicle-fuel=Показывает расчетное количество топлива/энергии для транспортных средств и топлива для платформы, если оно доступно.
facc-stats-hud-offset-preset-one-info=Предустановленное вертикальное смещение, когда видна только одна верхняя правая информационная строка игры (используется смещение 22).
facc-stats-hud-offset-preset-two-infos=Предустановленное вертикальное смещение, когда видны две верхние правые информационные строки игры (используется смещение 39).
facc-stats-hud-offset-preset-three-infos=Предустановленное вертикальное смещение, когда видны три верхние правые информационные строки игры (используется смещение 60).
facc-remove-electricity-usage=Преобразует поддерживаемые электрические объекты в энергию пустоты, чтобы они могли работать без электрических сетей.\n[color=yellow]Настройка запуска: требует перезапуска игры.[/color]\n[color=orange]Применяется только к прототипам, которые принимают энергию пустоты в API.[/color]
facc-remove-fuel-usage=Преобразует совместимые сущности с топливным/жидкостным источником энергии в void-энергию, чтобы они работали без топлива.\n[color=yellow]Параметр запуска: требуется перезапуск игры.[/color]\n[color=orange]Применяется только к прототипам, которые принимают void-энергию в API.[/color]
facc-ignore-recipe-inputs=Убирает требования к ингредиентам у всех рецептов, поэтому результаты производятся без расхода входных ресурсов.\n[color=yellow]Параметр запуска: требуется перезапуск игры.[/color]\n[color=orange]При включении нельзя выбрать качество рецепта.[/color]\n[color=red]Влияет на все рецепты, включая рецепты модов.[/color]

[item-group-name]
facc-cheat-tools=Чит-инструменты

[item-subgroup-name]
facc-cheat-recipes=Рецепты чит-инструментов


set-inventory-slots-bonus=Устанавливает бонус слотов инвентаря вашей фракции.\n[color=orange]Минимум 0, или 10 после исследования [font=default-bold]Пояс для инструментов[/font].[/color]


