[mod-setting-description]
facc-show-cheat-tab=Aktivieren Sie die Registerkarte „Cheat-Tools“ für die Herstellung im Herstellungsmenü
facc-internal-names=Überschreiben Sie den lokalisierten Namen jedes Prototyps mit seiner internen Kennung und den Details
facc-enable-achievement-overrides=Wenn diese Option aktiviert ist, werden integrierte Leistungsbeschränkungen umgangen
facc-infinite-resources=Wenn aktiviert, werden alle Ressourcen wie „Satisfactory“ unendlich und erscheinen immer in voller normaler Menge.\n\n[font=default-bold][color=red]Warnung:[/color]\n[color=orange]Durch das Aktivieren oder Deaktivieren dieser Option werden alle Ressourcen auf der Karte neu geladen und wiederhergestellt.[/color]\n[color=red]Und auf großen Karten erfolgt der erste Ladevorgang nach Änderung dieser Einstellung kann mehrere Minuten dauern. Warten Sie einfach – das Spiel wird normal fortgesetzt. Um wiederholtes langes Laden zu vermeiden, speichern Sie das Spiel, nachdem Sie diese Option aktiviert oder deaktiviert haben.[/color][/font]
facc-infinite-resources-multiplier-solid=Bestimmt den Multiplikator für unendliche Ressourcen in Feststoffkategorien (z. B. basisch-fest, hart-fest und andere nicht flüssige Typen). Beeinflusst Fülle und Auffüllmengen.\n1× = 100 %\n2× = 200 %\n5× = 500 %\n10× = 1000 %\n20× = 2000 %\n50× = 5000 %
facc-infinite-resources-multiplier-fluid=Bestimmt den Multiplikator für unendliche Ressourcen in Fluidkategorien (z. B. Basis-Fluid- und modifizierte Fluid-Kategorien). Beeinflusst Fülle und Aufladebeträge. Modifizierte Kategorien werden als fließend behandelt, wenn der Kategoriename „flüssig“ enthält oder die Ressource eine Flüssigkeit ergibt.\n1× = 100 %\n2× = 200 %\n5× = 500 %\n10× = 1000 %\n20× = 2000 %\n50× = 5000 %
facc-enable-auto-resource-regeneration=Wenn diese Option aktiviert ist, werden endliche Ressourcen automatisch neu generiert, wenn die Einstellung „Unendliche Ressourcen“ umgeschaltet wird (wenn aktiviert und dann deaktiviert). Die manuelle Regeneration über die Schaltfläche „Ressourcen regenerieren“ in der Admin-GUI ist unabhängig davon immer verfügbar.\n[color=green]Karteneinstellung: kein Neustart des Spiels erforderlich.[/color]\n[color=red][font=default-bold]Warnung:[/font][/color]\n[color=orange]Es wird nicht empfohlen, diese Einstellung gleichzeitig mit Infinite zu aktivieren Ressourcen.[/color]\n[color=red]Für beste Ergebnisse verwenden Sie das eine oder das andere – niemals beide aktiviert.[/color]\n[color=green]Es ist auch sicher und wird unterstützt, beide deaktiviert zu lassen.[/color]
facc-instant-mining-drills=Vervielfacht die Abbaugeschwindigkeit jedes Bergbaubohrers um einen gewaltigen Faktor.
facc-instant-crafting-machines=Vervielfacht die Herstellungsgeschwindigkeit, sodass Rezepte sofort fertig sind.
facc-enable-background-optimization=[font=default-bold]Standard:[/font] AUS.\n[color=green]Karteneinstellung: kein Neustart des Spiels erforderlich.[/color]\n\n[color=green][font=default-bold]EIN (Optimierte Verarbeitung):[/font][/color]\nVerarbeitet schwere Aktionen im Hintergrund, um ein Einfrieren auf großen Flächen zu vermeiden speichert.\n[color=green]Vorteile:[/color] flüssigeres Gameplay, sicherer für große Karten.\n[color=yellow]Nachteile:[/color] Die vollständige Fertigstellung kann etwas länger dauern.\n\n[color=orange][font=default-bold]AUS (Sofort Verarbeitung):[/font][/color]\nFührt alles sofort auf einmal aus.\n[color=green]Vorteile:[/color] Schnellste Fertigstellung bei kleinen Speicherungen.\n[color=red]Nachteile:[/color] kann bei großen Speicherungen einfrieren/stottern.
facc-stats-hud-enabled=Zeigt ein leichtes HUD mit Live-Gameplay-Statistiken.
facc-stats-hud-single-line=Zeigt alle aktivierten HUD-Sensoren in einer horizontalen Zeile an. Für vertikal gestapelte Linien deaktivieren.
facc-stats-hud-adjust-for-fps-ups=Stats HUD: adjust for FPS/UPS indicator
facc-stats-hud-adjust-for-clock=Stats HUD: adjust for clock
facc-stats-hud-show-research-eta=Zeigt die geschätzte verbleibende Zeit für die aktuelle Kraftforschung an.
facc-stats-hud-show-coordinates=Zeigt Ihre aktuelle X- und Y-Position an.
facc-stats-hud-show-distance-from-point=Zeigt die Entfernung von einem unten konfigurierten benutzerdefinierten Punkt an.
facc-stats-hud-distance-origin-x=X-Koordinate des Referenzpunkts, die vom Abstandssensor verwendet wird.
facc-stats-hud-distance-origin-y=Referenzpunkt-Y-Koordinate, die vom Abstandssensor verwendet wird.
facc-stats-hud-show-evolution=Zeigt den aktuellen Feindentwicklungsfaktor für Ihre Oberfläche an.
facc-stats-hud-show-pollution=Zeigt die Verschmutzung an Ihrer aktuellen Position an.
facc-stats-hud-show-playtime=Zeigt die gesamte gespeicherte Spielzeit an.
facc-stats-hud-show-playtime-days=Wenn diese Option aktiviert ist, wird die Spielzeit als Tage + Zeit angezeigt.
facc-stats-hud-show-daytime=Zeigt die aktuelle Oberflächenzeit und die Anzahl der Tage an.
facc-stats-hud-show-movement-speed=Zeigt Ihre Bewegungsgeschwindigkeit (zu Fuß oder im Fahrzeug).
facc-stats-hud-show-player-max-speed=Wenn Sie zu Fuß unterwegs sind, wird auch die berechnete Höchstgeschwindigkeit des Spielers angezeigt.
facc-stats-hud-show-vehicle-max-speed=Zeigt im Fahrzeug auch die berechnete Höchstgeschwindigkeit des Fahrzeugs an.
facc-stats-hud-show-handcraft-timer=Zeigt die verbleibende Warteschlangenzeit für die manuelle Herstellung an.
facc-stats-hud-show-vehicle-fuel=Zeigt die geschätzte Treibstoff-/Energiemenge für Fahrzeuge und Plattformtreibstoff an, sofern verfügbar.
facc-stats-hud-offset-preset-one-info=Voreingestellter vertikaler Versatz für den Fall, dass nur eine Zeile mit Spielinformationen oben rechts sichtbar ist (verwendet Versatz 22).
facc-stats-hud-offset-preset-two-infos=Voreingestellter vertikaler Versatz für den Fall, dass oben rechts zwei Spielinfozeilen sichtbar sind (verwendet Versatz 39).
facc-stats-hud-offset-preset-three-infos=Voreingestellter vertikaler Versatz für den Fall, dass oben rechts drei Spielinfozeilen sichtbar sind (verwendet Versatz 60).
facc-remove-electricity-usage=Wandelt unterstützte elektrische Einheiten in Leereenergie um, damit sie ohne elektrische Netzwerke laufen können.\n[color=yellow]Starteinstellung: erfordert einen Neustart des Spiels.[/color]\n[color=orange]Gilt nur für Prototypen, die Leereenergie in der API akzeptieren.[/color]
facc-remove-fuel-usage=Wandelt kompatible Entitäten mit Brennstoff-/Flüssigkeitsenergie in Void-Energie um, sodass sie ohne Kraftstoff laufen.\n[color=yellow]Starteinstellung: erfordert einen Neustart des Spiels.[/color]\n[color=orange]Gilt nur für Prototypen, die in der API Void-Energie akzeptieren.[/color]
facc-ignore-recipe-inputs=Entfernt Zutatenanforderungen aus allen Rezepten, sodass Ergebnisse ohne Verbrauch von Eingaben hergestellt werden.\n[color=yellow]Starteinstellung: erfordert einen Neustart des Spiels.[/color]\n[color=orange]Wenn aktiviert, kann die Rezeptqualität nicht ausgewählt werden.[/color]\n[color=red]Wirkt sich auf alle Rezepte aus, auch auf modifizierte Rezepte.[/color]

