surface-pressure=Legt die aktuelle Oberflächendruckeigenschaft fest.\n[color=orange]Erfordert die Installation und Aktivierung der Erweiterung [font=default-bold]Space Age[/font].[/color]
surface-magnetic-field=Legt die aktuelle Eigenschaft des Oberflächenmagnetfelds fest.\n[color=orange]Erfordert die Installation und Aktivierung der Erweiterung [font=default-bold]Space Age[/font].[/color]
surface-gravity=Legt die aktuelle Oberflächenschwerkrafteigenschaft fest.\n[color=orange]Erfordert die Installation und Aktivierung der Erweiterung [font=default-bold]Space Age[/font].[/color]
disable-pollution=Beseitigt alle vorhandenen Verschmutzungen und verhindert die Entstehung neuer Verschmutzungen.
remove-pollution=Entfernt sofort alle Verschmutzungen von der aktuellen Oberfläche.
repair-rebuild=Repariert beschädigte Entitäten und belebt Geisterentitäten und -kacheln wieder.
hide-map=Stellt den Kriegsnebel in bereits aufgedeckten Bereichen wieder her.
remove-decon=Entfernt alle Elemente mit Dekonstruktionsmarkierungen.
remove-ground-items=Entfernt alle auf den Boden fallengelassenen Gegenstände von allen Oberflächen.
auto-clean-pollution=Reinigt Verschmutzungen automatisch in regelmäßigen Abständen.\n[color=orange]In Sekunden.[/color]
reveal-map=Deckt alle Bereiche im konfigurierten Radius um den Spieler auf.
remove-cliffs=Zerstört alle Klippen innerhalb des definierten Radius.
add-robots=Fügt Ihrem Inventar 50 Bauroboter und 50 Logistikroboter hinzu.\n[color=orange]Wenn die Erweiterung [font=default-bold]Quality[/font] installiert und aktiviert ist, werden die Roboter immer von legendärer Qualität sein.[/color]
increase-robot-speed=Passt den Geschwindigkeitsbonusmultiplikator des Arbeitsroboters entsprechend dem Schieberegler an.
set-crafting-speed=Erhöhen Sie den Bonusmultiplikator für die Herstellungsgeschwindigkeit entsprechend dem Schieberegler.
toggle-minable=Schaltet alle Entitäten zwischen abbaubaren und nicht abbaubaren Zuständen um.
set-mining-speed=Passt den Mining-Geschwindigkeitsbonusmultiplikator entsprechend dem Schieberegler an.
regenerate-resources=Regeneriert alle endlichen Ressourcen an der Oberfläche und aktualisiert den Bergbau.\n[color=red][font=default-bold]Auf sehr großen Karten mit vielen Entitäten kann diese Funktion das Spiel vorübergehend einfrieren. Bitte warten Sie einen Moment – ​​es wird sich in Kürze auftauen und normal fortfahren![/font][/color]
increase-resources=Setzt die Menge aller Ressourcen auf den Maximalwert.
generate-planet-surfaces=Erstellt Planetenoberflächen und kartiert einen zentralen Bereich von 150×150.\n[color=orange]Erfordert die Installation und Aktivierung der Erweiterung [font=default-bold]Space Age[/font].[/color]
teleport-to-planet=Teleports you to the selected planet.
tp-open=Öffnet ein spezielles Fast Teleport-Fenster, das manuell gespeicherte Punkte und erzwungene Kartentags kombiniert.\nGespeicherte Punkte behalten die Koordinaten in der Listenbezeichnung (zum Beispiel: Name (X,Y)), während beim Bearbeiten nur der benutzerdefinierte Name beibehalten wird.
recharge-energy=Lädt Energie für Maschinen, Akkumulatoren und Ausrüstungsgitter auf.\n[color=red][font=default-bold]Auf sehr großen Karten mit vielen Einheiten kann diese Funktion das Spiel vorübergehend einfrieren. Bitte warten Sie einen Moment – ​​es wird sich in Kürze auftauen und normal fortfahren![/font][/color]
trains-auto-mode=Schaltet alle Züge zwischen automatischem und manuellem Modus um.
platform-distance=Stellt die Andockdistanz von Raumplattformen per Schieberegler ein.\n[color=orange]Erfordert die installierte und aktivierte Erweiterung [font=default-bold]Space Age[/font].[/color]
fill-thrusters=Betankt alle Triebwerke der aktuellen Raumplattform mit dem erforderlichen Treibstoff und Oxidationsmittel.\n[color=orange]Erfordert die installierte und aktivierte Erweiterung [font=default-bold]Space Age[/font].[/color]
high_infinite_research_levels=Setzt alle unendlichen Forschungstechnologien auf Stufe 100
add_infinite_research_levels=Fügt jeder konfigurierten unendlichen Forschungstechnologie jedes Mal 100 Level hinzu, wenn Sie sie verwenden.
instant-blueprint-building=Belebt Entitäts- und Kachelgeister nach der Platzierung sofort wieder.\nFunktioniert mit dem normalen Charakter (kein Editor) und verbraucht keine Gegenstände.
instant-deconstruction=Wenn eine Entität zur Dekonstruktion markiert ist, entfernen Sie sie sofort.\nVersucht zuerst, mein Objekt abzubauen; Ist dies nicht möglich, wird die Entität zerstört.
instant-upgrading=Wendet das markierte Upgrade sofort an.
instant-rail-planner=Belebt vom Schienenplaner platzierte Schienengeister nur wieder, wenn „Instant Blueprint Building“ ausgeschaltet ist.
ghost-mode=Deaktivieren Sie die Kollision, damit Sie durch Entitäten hindurchgehen können. Schalten Sie erneut um, um zum Normalzustand zurückzukehren.
invincible-player=Dein Charakter ignoriert jeglichen Schaden.\n[color=orange]Erfordert einen Charakterkörper. Nicht verfügbar in God oder Editor oder vor dem Respawn.[/color]
repair-mined-item=Repariert Entitäten wieder vollständig, bevor Sie sie abbauen.
instant-request=Wenn diese Option aktiviert ist, bleibt der Lagerbestand auf die in den aktiven Logistikanfrageabschnitten festgelegten Mindestmengen aufgefüllt.
instant-trash=Löscht Papierkorbelemente, anstatt Bots zu schicken, um sie abzurufen. Praktisch, wenn der Vorrat voll ist.
indestructible-builds_permanent=Machen Sie alle Ihre aktuellen Gebäude auf jeder Oberfläche unzerstörbar. Dauerhaft.
non-minable-permanent=Machen Sie alle Ihre aktuellen Gebäude auf der aktuellen Oberfläche nicht abbaubar. Dauerhaft.

