[mod-setting-description]
facc-show-cheat-tab=Enable the Cheat Tools crafting tab in the crafting menu
facc-internal-names=Ersetzt den lokalisierten Namen jedes Prototyps durch seine interne Kennung und Details
facc-enable-achievement-overrides=When enabled, built-in achievement restrictions are bypassed
facc-infinite-resources=When enabled, all resources become infinite like Satisfactory and always spawn at their full normal amount.\n\n[font=default-bold][color=red]Warning:[/color]\n[color=orange]Enabling or disabling this option reloads and restores all resources on the map.[/color]\n[color=red]And on large maps, the first load after changing this setting may take several minutes. Just wait — the game will resume normally. To avoid repeated long loads, save the game after enabling or disabling this option.[/color][/font]
facc-infinite-resources-multiplier-solid=Determines the multiplier for infinite resources in solid categories (e.g., basic-solid, hard-solid, and other non-fluid types). Affects richness and top-up amounts.\n1× = 100%\n2× = 200%\n5× = 500%\n10× = 1000%\n20× = 2000%\n50× = 5000%
facc-infinite-resources-multiplier-fluid=Determines the multiplier for infinite resources in fluid categories (e.g., basic-fluid and modded fluid categories). Affects richness and top-up amounts. Modded categories are treated as fluid if the category name contains "fluid" or the resource yields a fluid.\n1× = 100%\n2× = 200%\n5× = 500%\n10× = 1000%\n20× = 2000%\n50× = 5000%
facc-enable-auto-resource-regeneration=When enabled, automatically regenerates finite resources when toggling (when activated and then deactivated) the Infinite Resources setting. Manual regeneration via the "Regenerate Resources" button in the admin GUI is always available regardless.\n[color=green]Map setting: no game restart required.[/color]\n[color=red][font=default-bold]Warning:[/font][/color]\n[color=orange]It is not recommended to enable this setting at the same time as Infinite Resources.[/color]\n[color=red]For best results, use one or the other — never both enabled.[/color]\n[color=green]Keeping both disabled is also safe and supported.[/color]
facc-instant-mining-drills=Multipliziert die Abbaugeschwindigkeit jedes Bergbaubohres um einen gewaltigen Faktor.
facc-instant-crafting-machines=Multipliziert die Fertigungsgeschwindigkeit, sodass Rezepte sofort abgeschlossen werden.
facc-enable-background-optimization=[font=default-bold]Default:[/font] OFF.\n[color=green]Map setting: no game restart required.[/color]\n\n[color=green][font=default-bold]ON (Optimized processing):[/font][/color]\nProcesses heavy actions in the background to avoid freezes on large saves.\n[color=green]Pros:[/color] smoother gameplay, safer for big maps.\n[color=yellow]Cons:[/color] total completion may take a bit longer.\n\n[color=orange][font=default-bold]OFF (Instant processing):[/font][/color]\nRuns everything immediately in one go.\n[color=green]Pros:[/color] fastest completion on small saves.\n[color=red]Cons:[/color] may freeze/stutter on large saves.

