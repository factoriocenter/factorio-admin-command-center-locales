auto-instant-research=設定した間隔で自動的に即時研究を実行します。\n[color=orange]単位：秒。[/color]
set-game-speed=スライダー値に応じて、ゲーム全体の速度倍率を設定します。
disable-friendly-fire=味方同士のダメージを防止します。
indestructible-builds=サーフェス上の既存エンティティをすべて破壊不能にします。
peaceful-mode=平和モードを有効化し、バイターの攻撃を防止します。\n[color=orange]挑発時を除く。[/color]
ammo-turrets=タレットに適切な弾薬を自動補充します。
ammo-damage-boost=スライダー値に基づき、弾薬のダメージボーナス倍率を適用します。
turret-damage-boost=スライダー値に基づき、タレットの攻撃ボーナス倍率を適用します。
enemy-expansion=バイターの巣の自動拡張をオン/オフします。
remove-nests=設定した半径内のバイターの巣をすべて除去します。
always-day=サーフェスを常に昼間に保ち、夜のサイクルを無効化します。
surface-freeze-daytime=現在のサーフェス上の昼夜サイクルを現在の昼間の値で固定します。
surface-daytime=スライダーと適用ボタンを使用して、現在のサーフェスの日中を 0.00 から 1.00 まで設定します。
surface-daytime-midday=現在のサーフェスの日中を正午 (0.50) にすばやく設定します。
surface-daytime-midnight=現在のサーフェスの日中を午前 0 時 (0.00) に素早く設定します。
surface-peaceful-mode=現在のサーフェスにのみ平和モードを適用します。
surface-no-enemies=現在の地表のみで敵の生成を防ぎます。
surface-pressure=現在の表面圧力プロパティを設定します。\n[color=orange][font=default-bold]Space Age[/font] 拡張機能をインストールして有効にする必要があります。[/color]
surface-magnetic-field=現在の表面磁場のプロパティを設定します。\n[color=orange][font=default-bold]Space Age[/font] 拡張機能をインストールして有効にする必要があります。[/color]
surface-gravity=現在の表面重力プロパティを設定します。\n[color=orange][font=default-bold]Space Age[/font] 拡張機能をインストールして有効にする必要があります。[/color]
disable-pollution=既存の汚染をすべて除去し、新たな汚染の発生を防ぎます。
remove-pollution=現在のサーフェスから汚染を即座にすべて取り除きます。
repair-rebuild=損傷したエンティティを修理し、ゴーストエンティティとタイルを復活させます。
hide-map=既に開示済みの領域に戦場の霧を復元します。
remove-decon=解体指定が付いたすべてのエンティティを除去します。
remove-ground-items=すべてのサーフェスから地面に落ちたアイテムを削除します。
auto-clean-pollution=一定間隔で自動的に汚染を清掃します。\n[color=orange]単位：秒。[/color]
reveal-map=プレイヤー周囲の設定半径内の領域を表示します。
remove-cliffs=設定半径内のすべての崖を破壊します。
add-robots=インベントリに建設ロボット 50 体と物流ロボット 50 体を挿入します。\n[color=orange][font=default-bold]Quality[/font] 拡張がインストールされ有効な場合、ロボットは常にレジェンダリー品質になります。[/color]
increase-robot-speed=スライダー値に応じて作業ロボット速度ボーナスの倍率を調整します。
set-crafting-speed=スライダー値に応じて製作速度ボーナスの倍率を増加します。
toggle-minable=すべてのエンティティを採掘可能/不可能の状態で切り替えます。
set-mining-speed=スライダー値に応じて採掘速度ボーナスの倍率を調整します。
regenerate-resources=サーフェス上の有限資源をすべて再生成し、採掘を再初期化します。\n[color=red][font=default-bold]エンティティ数の多い非常に大きなマップでは、一時的にゲームがフリーズする場合があります。少しお待ちください—まもなく解凍して通常通り再開します！[/font][/color]
increase-resources=すべての資源量を最大値に設定します。
generate-planet-surfaces=惑星表面を作成し、中央 150×150 の領域をチャートします。\n[color=orange][font=default-bold]Space Age[/font] 拡張のインストールと有効化が必要です。[/color]
teleport-to-planet=Teleports you to the selected planet.
tp-open=手動で保存したポイントと強制マップ タグを混合する専用の高速テレポート ウィンドウを開きます。\n保存したポイントはリスト ラベルの座標を保持します (例: 名前 (X,Y))。編集ではカスタム名のみが保持されます。
recharge-energy=機械・蓄電池・装備グリッドのエネルギーを再充電します。\n[color=red][font=default-bold]エンティティ数の多い非常に大きなマップでは、一時的にゲームがフリーズする場合があります。少しお待ちください—まもなく解凍して通常通り再開します！[/font][/color]
trains-auto-mode=すべての列車を自動/手動モードで切り替えます。
platform-distance=スライダーで宇宙プラットフォームのドッキング距離を調整します。\n[color=orange][font=default-bold]Space Age[/font] 拡張のインストールと有効化が必要です。[/color]
fill-thrusters=現在の宇宙プラットフォーム上のすべてのスラスターに、必要な燃料と酸化剤を補給します。\n[color=orange][font=default-bold]Space Age[/font] 拡張の導入と有効化が必要です。[/color]
high_infinite_research_levels=すべての無限研究をレベル 100 に設定
add_infinite_research_levels=使用するたびに、設定された各無限研究テクノロジーへ 100 レベルを追加します。
instant-blueprint-building=設置後にエンティティとタイルのゴーストを即座に復活させます。\nエディターなしの通常キャラクターでも機能し、アイテムは消費しません。
instant-deconstruction=エンティティが解体指定されたら即座に除去します。\nまず採掘を試み、できない場合はエンティティを破壊します。
instant-upgrading=指定されたアップグレードを即座に適用します。
instant-rail-planner=「設計図の即時建設」がオフのときのみ、レールプランナーで配置されたレールのゴーストを復活させます。
ghost-mode=当たり判定のないキャラクターを有効化し、エンティティをすり抜けて歩けます。再度切り替えると通常に戻ります。
invincible-player=キャラクターはすべてのダメージを無視します。\n[color=orange]キャラクター本体が必要です。ゴッドモード／エディターモード中やリスポーン前は利用できません。[/color]
repair-mined-item=エンティティをマイニングする直前に完全な状態に修復します。
instant-request=有効時、アクティブな個人物流リクエスト欄で設定した最小量まで、インベントリを自動補充します。
instant-trash=ボットで回収させる代わりに、トラッシュスロットのアイテムを即座に削除します。インベントリが一杯のときに便利です。
indestructible-builds_permanent=現在の建築物をすべて、全サーフェスで破壊不能にします。恒久。
non-minable-permanent=現在の建築物をすべて、全サーフェスで採掘不可にします。恒久。

