[mod-setting-description]
facc-show-cheat-tab=クラフトメニューの「Cheat Tools」クラフトタブを有効にします。
facc-internal-names=各プロトタイプのローカライズされた名前を内部識別子と詳細でオーバーライドします。
facc-enable-achievement-overrides=有効にすると、組み込みの実績制限がバイパスされます
facc-infinite-resources=有効にすると、すべてのリソースが Satisfactory のように無限になり、常に通常の最大量で生成されます。\n\n[font=default-bold][color=red]@警告:[/color]\n[color=orange]このオプションを有効または無効にすると、マップ上のすべてのリソースがリロードされ、復元されます。[/color]\n[color=red]大きなマップでは、変更後の最初のロードこの設定には数分かかる場合があります。そのままお待ちください。ゲームは通常どおり再開されます。長時間のロードが繰り返されるのを避けるには、このオプションを有効または無効にしてからゲームを保存してください。[/color][/font]
facc-infinite-resources-multiplier-solid=ソリッド カテゴリ (ベーシック ソリッド、ハード ソリッド、その他の非流体タイプなど) の無限リソースの乗数を決定します。濃さと補充量に影響します。\n1× = 100%\n2× = 200%\n5× = 500%\n10× = 1000%\n20× = 2000%\n50× = 5000%
facc-infinite-resources-multiplier-fluid=流体カテゴリ (基本流体カテゴリや改造流体カテゴリなど) の無限リソースの乗数を決定します。濃さと補充量に影響します。カテゴリ名に「流体」が含まれている場合、またはリソースが流体を生成する場合、変更されたカテゴリは流体として扱われます。\n1× = 100%\n2× = 200%\n5× = 500%\n10× = 1000%\n20× = 2000%\n50× = 5000%
facc-enable-auto-resource-regeneration=有効にすると、無限リソース設定を切り替えるときに (アクティブ化してから非アクティブ化するとき)、有限リソースが自動的に再生成されます。管理 GUI の [リソースの再生成] ボタンによる手動再生成は、いつでも利用できます。\n[color=green]マップ設定: ゲームの再起動は必要ありません。[/color]\n[color=red][font=default-bold]警告:[/font][/color]\n[color=orange]Infinite と同時にこの設定を有効にすることはお勧めできません。リソース。[/color]\n[color=red]最良の結果を得るには、どちらか一方を使用してください。両方を有効にすることは決してしないでください。[/color]\n[color=green]両方を無効にしておくのも安全であり、サポートされています。[/color]
facc-instant-mining-drills=すべての採掘ドリルの採掘速度に大きな係数を掛けます。
facc-instant-crafting-machines=製作速度が倍増するため、レシピは瞬時に完了します。
facc-enable-background-optimization=[font=default-bold]デフォルト:[/font] OFF。\n[color=green]マップ設定: ゲームの再起動は必要ありません。[/color]\n\n[color=green][font=default-bold]ON (最適化処理):[/font][/color]\n大規模なゲームでのフリーズを避けるために、バックグラウンドで重いアクションを処理します。 \n[color=green]長所:[/color] よりスムーズなゲームプレイ、大きなマップの安全性。\n[color=yellow]短所:[/color] 完全に完了するには少し時間がかかる場合があります。\n\n[color=orange][font=default-bold]OFF (インスタント)処理):[/font][/color]\n一度にすべてをすぐに実行します。\n[color=green]長所:[/color] 小さな保存で最も速く完了します。\n[color=red]短所:[/color] は、大きな保存でフリーズしたり途切れたりすることがあります。
facc-stats-hud-enabled=ライブゲームプレイ統計を含む軽量の HUD を表示します。
facc-stats-hud-single-line=有効になっているすべての HUD センサーを水平 1 行に表示します。垂直積み上げ線の場合は無効にします。
facc-stats-hud-adjust-for-fps-ups=Stats HUD: adjust for FPS/UPS indicator
facc-stats-hud-adjust-for-clock=Stats HUD: adjust for clock
facc-stats-hud-show-research-eta=現在の力の研究の推定残り時間を表示します。
facc-stats-hud-show-coordinates=現在の X 位置と Y 位置を表示します。
facc-stats-hud-show-distance-from-point=以下で設定したカスタムポイントからの距離を表示します。
facc-stats-hud-distance-origin-x=距離センサーで使用される基準点の X 座標。
facc-stats-hud-distance-origin-y=距離センサーで使用される基準点の Y 座標。
facc-stats-hud-show-evolution=あなたの地表の現在の敵の進化係数を表示します。
facc-stats-hud-show-pollution=現在位置の汚染を表示します。
facc-stats-hud-show-playtime=合計セーブプレイ時間を表示します。
facc-stats-hud-show-playtime-days=有効にすると、プレイ時間は日数 + 時間として表示されます。
facc-stats-hud-show-daytime=現在の水面時間と日数を表示します。
facc-stats-hud-show-movement-speed=移動速度（徒歩または乗り物）を表示します。
facc-stats-hud-show-player-max-speed=徒歩の場合、計算されたプレイヤーの最大速度も表示されます。
facc-stats-hud-show-vehicle-max-speed=車両に乗車している場合は、計算された車両の最高速度も表示されます。
facc-stats-hud-show-handcraft-timer=手動クラフトのキューの残り時間を表示します。
facc-stats-hud-show-vehicle-fuel=車両およびプラットフォーム推進剤の推定燃料/エネルギー (利用可能な場合) を表示します。
facc-stats-hud-offset-preset-one-info=右上のゲーム情報行が 1 つだけ表示される場合の垂直オフセットをプリセットします (オフセット 22 を使用)。
facc-stats-hud-offset-preset-two-infos=右上の 2 つのゲーム情報行が表示される場合の垂直オフセットをプリセットします (オフセット 39 を使用)。
facc-stats-hud-offset-preset-three-infos=右上の 3 つのゲーム情報行が表示される場合の垂直オフセットをプリセットします (オフセット 60 を使用)。

[item-group-name]
facc-cheat-tools=チートツール

[item-subgroup-name]
facc-cheat-recipes=チートツールのレシピ
