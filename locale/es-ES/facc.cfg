[mod-setting-description]
facc-show-cheat-tab=Habilite la pestaña de elaboración de Cheat Tools en el menú de elaboración
facc-internal-names=Anule el nombre localizado de cada prototipo con su identificador interno y sus detalles.
facc-enable-achievement-overrides=Cuando está habilitado, se omiten las restricciones de logros integradas.
facc-infinite-resources=Cuando está habilitado, todos los recursos se vuelven infinitos como Satisfactorio y siempre se generan en su cantidad normal completa.\n\n[font=default-bold][color=red]Advertencia:[/color]\n[color=orange]Al habilitar o deshabilitar esta opción se recargan y restauran todos los recursos en el mapa.[/color]\n[color=red]Y en mapas grandes, la primera carga después del cambio. esta configuración puede tardar varios minutos. Espera: el juego se reanudará normalmente. Para evitar cargas largas y repetidas, guarda el juego después de habilitar o deshabilitar esta opción.[/color][/font]
facc-infinite-resources-multiplier-solid=Determina el multiplicador de recursos infinitos en categorías sólidas (por ejemplo, sólido básico, sólido duro y otros tipos no fluidos). Afecta la riqueza y los montos de recarga.\n1× = 100%\n2× = 200%\n5× = 500%\n10× = 1000%\n20× = 2000%\n50× = 5000%
facc-infinite-resources-multiplier-fluid=Determina el multiplicador de recursos infinitos en categorías de fluidos (por ejemplo, categorías de fluidos básicos y modificados). Afecta la riqueza y las cantidades de recarga. Las categorías modificadas se tratan como fluidas si el nombre de la categoría contiene "fluido" o el recurso produce un fluido.\n1× = 100%\n2× = 200%\n5× = 500%\n10× = 1000%\n20× = 2000%\n50× = 5000%
facc-enable-auto-resource-regeneration=Cuando está habilitado, regenera automáticamente recursos finitos al alternar (cuando se activa y luego se desactiva) la configuración de Recursos infinitos. La regeneración manual a través del botón "Regenerar recursos" en la GUI de administración siempre está disponible independientemente.\n[color=green]Configuración del mapa: no es necesario reiniciar el juego.[/color]\n[color=red][font=default-bold]Advertencia:[/font][/color]\n[color=orange]No se recomienda habilitar esta configuración al mismo tiempo que Infinite Recursos.[/color]\n[color=red]Para obtener mejores resultados, use uno u otro; nunca ambos habilitados.[/color]\n[color=green]Mantener ambos deshabilitados también es seguro y compatible.[/color]
facc-instant-mining-drills=Multiplica la velocidad de extracción de cada taladro minero por un factor enorme.
facc-instant-crafting-machines=Multiplica la velocidad de elaboración, para que las recetas terminen al instante.
facc-enable-background-optimization=[font=default-bold]Predeterminado:[/font] APAGADO.\n[color=green]Configuración del mapa: no es necesario reiniciar el juego.[/color]\n\n[color=green][font=default-bold]ON (Procesamiento optimizado):[/font][/color]\nProcesa acciones pesadas en segundo plano para evitar congelaciones en grande. guardados.\n[color=green]Pros:[/color] juego más fluido, más seguro para mapas grandes.\n[color=yellow]Contras:[/color] la finalización total puede tardar un poco más.\n\n[color=orange][font=default-bold]OFF (Instantáneo procesamiento):[/font][/color]\nEjecuta todo inmediatamente de una vez.\n[color=green]Pros:[/color] finalización más rápida en guardados pequeños.\n[color=red]Contras:[/color] puede congelarse/tartamudear en guardados grandes.
facc-stats-hud-enabled=Muestra un HUD liviano con estadísticas de juego en vivo.
facc-stats-hud-single-line=Muestra todos los sensores HUD habilitados en una línea horizontal. Desactivar para líneas apiladas verticales.
facc-stats-hud-adjust-for-fps-ups=Stats HUD: adjust for FPS/UPS indicator
facc-stats-hud-adjust-for-clock=Stats HUD: adjust for clock
facc-stats-hud-show-research-eta=Muestra el tiempo restante estimado para la investigación de la fuerza actual.
facc-stats-hud-show-coordinates=Muestra su posición actual X e Y.
facc-stats-hud-show-distance-from-point=Muestra la distancia desde un punto personalizado configurado a continuación.
facc-stats-hud-distance-origin-x=Punto de referencia Coordenada X utilizada por el sensor de distancia.
facc-stats-hud-distance-origin-y=Punto de referencia Coordenada Y utilizada por el sensor de distancia.
facc-stats-hud-show-evolution=Muestra el factor de evolución del enemigo actual para tu superficie.
facc-stats-hud-show-pollution=Muestra la contaminación en su posición actual.
facc-stats-hud-show-playtime=Muestra el tiempo total de reproducción guardada.
facc-stats-hud-show-playtime-days=Cuando está habilitado, el tiempo de reproducción se muestra como días + tiempo.
facc-stats-hud-show-daytime=Muestra el tiempo actual en superficie y el recuento de días.
facc-stats-hud-show-movement-speed=Muestra tu velocidad de movimiento (a pie o en vehículo).
facc-stats-hud-show-player-max-speed=Cuando está a pie, también muestra la velocidad máxima calculada del jugador.
facc-stats-hud-show-vehicle-max-speed=Cuando está en el vehículo, también muestra la velocidad máxima calculada del vehículo.
facc-stats-hud-show-handcraft-timer=Muestra el tiempo restante en la cola de elaboración manual.
facc-stats-hud-show-vehicle-fuel=Muestra el combustible/energía estimado para los vehículos y el propulsor de la plataforma cuando esté disponible.
facc-stats-hud-offset-preset-one-info=Desplazamiento vertical preestablecido para cuando solo es visible 1 línea de información del juego en la parte superior derecha (usa el desplazamiento 22).
facc-stats-hud-offset-preset-two-infos=Desplazamiento vertical preestablecido para cuando 2 líneas de información del juego en la parte superior derecha son visibles (usa el desplazamiento 39).
facc-stats-hud-offset-preset-three-infos=Desplazamiento vertical preestablecido para cuando las 3 líneas de información del juego en la parte superior derecha sean visibles (usa el desplazamiento 60).
facc-remove-electricity-usage=Convierte entidades eléctricas compatibles en energía nula para que puedan funcionar sin redes eléctricas.\n[color=yellow]Configuración de inicio: requiere reiniciar el juego.[/color]\n[color=orange]Se aplica solo a prototipos que aceptan energía nula en la API.[/color]
facc-remove-fuel-usage=Convierte entidades compatibles de energía por combustible/fluido a energía void para que funcionen sin combustible.\n[color=yellow]Configuración de inicio: requiere reiniciar el juego.[/color]\n[color=orange]Se aplica solo a prototipos que aceptan energía void en la API.[/color]
facc-ignore-recipe-inputs=Elimina los requisitos de ingredientes de todas las recetas para que los resultados se fabriquen sin consumir insumos.\n[color=yellow]Configuración de inicio: requiere reiniciar el juego.[/color]\n[color=orange]Cuando está activado, no se puede seleccionar la calidad de la receta.[/color]\n[color=red]Afecta a todas las recetas, incluidas las de mods.[/color]

