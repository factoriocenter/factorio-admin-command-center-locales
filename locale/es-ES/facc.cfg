surface-pressure=Establece la propiedad de presión superficial actual.\n[color=orange]Requiere que la expansión [font=default-bold]Space Age[/font] esté instalada y habilitada.[/color]
surface-magnetic-field=Establece la propiedad actual del campo magnético de la superficie.\n[color=orange]Requiere que la expansión [font=default-bold]Space Age[/font] esté instalada y habilitada.[/color]
surface-gravity=Establece la propiedad de gravedad de la superficie actual.\n[color=orange]Requiere que la expansión [font=default-bold]Space Age[/font] esté instalada y habilitada.[/color]
disable-pollution=Elimina contaminación y previene nueva generación.
remove-pollution=Elimina toda la contaminación de la superficie actual de inmediato.
repair-rebuild=Repara entidades dañadas y reconstruye los fantasmas.
hide-map=Restaura la niebla de guerra en áreas reveladas.
remove-decon=Elimina entidades marcadas para demolición.
remove-ground-items=Elimina todos los objetos del suelo.
auto-clean-pollution=Limpia contaminación automáticamente.\n[color=orange]En segundos.[/color]
reveal-map=Revela áreas dentro del radio configurado alrededor del jugador.
remove-cliffs=Destruye todos los acantilados dentro del radio definido.
add-robots=Inserta 50 robots de construcción y 50 logísticos.\n[color=orange]Con la expansión [font=default-bold]Quality[/font], serán legendarios.[/color]
increase-robot-speed=Ajusta el multiplicador de velocidad de robots según el control deslizante.
set-crafting-speed=Ajusta la bonificacion de velocidad de fabricacion manual de tu fuerza segun el control deslizante.
toggle-minable=Alterna entre minable y no minable para todas las entidades.
set-mining-speed=Ajusta el multiplicador de velocidad de minería según el control deslizante.
regenerate-resources=Regenera todos los recursos finitos y reinicia la minería.\n[color=red][font=default-bold]En mapas muy grandes puede congelar el juego temporalmente; espera a que recupere el control.[/font][/color]
increase-resources=Establece la cantidad de todos los recursos a su valor máximo.
generate-planet-surfaces=Crea superficies planetarias y traza un área de 150×150.\n[color=orange]Requiere la expansión [font=default-bold]Space Age[/font].[/color]
teleport-to-planet=Teleports you to the selected planet.
tp-open=Abre una ventana dedicada de Fast Teleport que combina puntos guardados manualmente y etiquetas de mapa forzado.\nLos puntos guardados mantienen las coordenadas en la etiqueta de la lista (por ejemplo: Nombre (X,Y)), mientras que la edición mantiene solo el nombre personalizado.
recharge-energy=Recarga energía de máquinas, acumuladores y grillas de equipo.\n[color=red][font=default-bold]En mapas muy grandes puede congelar el juego; espera a que recupere el control.[/font][/color]
trains-auto-mode=Alterna todos los trenes entre automático y manual.
platform-distance=Ajusta la distancia de acoplamiento de plataformas espaciales mediante el control deslizante.\n[color=orange]Requiere la expansión [font=default-bold]Space Age[/font].[/color]
fill-thrusters=Rellena todos los propulsores de la plataforma espacial actual con su combustible y oxidante requeridos.\n[color=orange]Requiere la expansión [font=default-bold]Era espacial[/font] instalada y habilitada.[/color]
high_infinite_research_levels=Establece investigaciones infinitas al nivel 100
add_infinite_research_levels=Agrega 100 niveles a cada tecnología de investigación infinita configurada cada vez que la usas.
instant-blueprint-building=Revive inmediatamente los fantasmas de entidades y losetas tras su colocación.\nFunciona con el personaje normal (sin editor) y no consume objetos.
instant-deconstruction=Cuando una entidad se marca para desmantelamiento, se elimina de inmediato.\nPrimero intenta minarla; si no es posible, destruye la entidad.
instant-upgrading=Aplica inmediatamente la mejora marcada.
instant-rail-planner=Solo revive los fantasmas de vías colocados con el planificador de vías cuando Construcción instantánea de planos está DESACTIVADA.
ghost-mode=Habilita un personaje sin colisiones para que puedas atravesar entidades. Vuelve a alternar para regresar a la normalidad.
invincible-player=Tu personaje ignora todo el daño.\n[color=orange]Requiere un cuerpo de personaje. No disponible en modo dios, editor o antes de reaparecer.[/color]
repair-mined-item=Repara entidades para que recuperen su plena salud justo antes de extraerlas.
instant-request=Al habilitarse, mantiene tu inventario abastecido hasta los mínimos definidos en las secciones activas de solicitudes personales de logística.
instant-trash=Elimina los objetos de la papelera en lugar de enviar bots a recogerlos. Útil cuando el inventario está lleno.
indestructible-builds_permanent=Hace indestructibles todas tus construcciones actuales en cada superficie. Permanente.
non-minable-permanent=Hace que todas tus construcciones actuales no sean minables en la superficie actual. Permanente.

character-health-bonus=Ajusta la bonificacion de salud del personaje de tu fuerza segun el control deslizante.
character-trash-slot-bonus=Define la bonificacion de ranuras de basura del personaje de tu fuerza.
robot-storage-bonus=Ajusta la bonificacion de almacenamiento de robots de trabajo de tu fuerza segun el control deslizante.
robot-battery-bonus=Ajusta la bonificacion de bateria de robots de trabajo de tu fuerza segun el control deslizante.
following-robot-lifetime-bonus=Ajusta la bonificacion de duracion de robots seguidores de tu fuerza segun el control deslizante.
gun-speed-boost=Aplica una bonificacion de velocidad de arma a categorias de municion compatibles segun el control deslizante.
artillery-range-boost=Ajusta la bonificacion de alcance de artilleria de tu fuerza segun el control deslizante.
surface-solar-power-multiplier=Establece el multiplicador de energia solar de la superficie actual.\n[color=orange]Rango de valores: 0 a 20.[/color]

bulk-inserter-capacity-bonus=Ajusta el bonus de capacidad de insertadores masivos de tu fuerza segun el control deslizante.\n[color=orange]Limite de API: 0 a 254.[/color]
beacon-distribution-bonus=Ajusta el bonus de distribucion de beacon de tu fuerza segun el control deslizante.
maximum-following-robot-count=Ajusta la cantidad maxima de robots seguidores de tu fuerza segun el control deslizante.
belt-stack-size-bonus=Ajusta el bonus de pila en cintas de tu fuerza segun el control deslizante.
laboratory-speed-bonus=Ajusta el bonus de velocidad de laboratorio de tu fuerza segun el control deslizante.
train-braking-force-bonus=Ajusta el bonus de fuerza de frenado de trenes de tu fuerza segun el control deslizante.
mining-drill-productivity-bonus=Ajusta el bonus de productividad de taladros mineros de tu fuerza segun el control deslizante.
inserter-stack-size-bonus=Ajusta el bonus de tamano de pila de insertadores de tu fuerza segun el control deslizante.
laboratory-productivity-bonus=Ajusta el bonus de productividad de laboratorio de tu fuerza segun el control deslizante.
