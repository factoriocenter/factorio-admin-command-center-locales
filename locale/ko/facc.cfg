[mod-setting-description]
facc-show-cheat-tab=제작 메뉴에서 치트 도구 제작 탭을 활성화하세요.
facc-internal-names=내부 식별자 및 세부정보로 각 프로토타입의 현지화된 이름을 재정의합니다.
facc-enable-achievement-overrides=활성화되면 내장된 업적 제한이 우회됩니다.
facc-infinite-resources=활성화되면 모든 리소스가 Satisfactory처럼 무한해지며 항상 전체 정상량으로 생성됩니다.\n\n@T4@@[color=red]경고:@@T6@\n[color=orange]이 옵션을 활성화 또는 비활성화하면 지도의 모든 리소스가 다시 로드되고 복원됩니다.[/color]\n[color=red]큰 지도에서는 이 설정을 변경한 후 첫 번째 로드 몇 분 정도 걸릴 수 있습니다. 기다리세요. 게임이 정상적으로 재개됩니다. 반복되는 긴 로딩을 피하려면 이 옵션을 활성화 또는 비활성화한 후 게임을 저장하세요.[/color][/font]
facc-infinite-resources-multiplier-solid=고체 범주(예: 기본-고체, 단단한 고체 및 기타 비유체 유형)의 무한 자원에 대한 승수를 결정합니다. 풍부함과 충전 금액에 영향을 줍니다.\n1× = 100%\n2× = 200%\n5× = 500%\n10× = 1000%\n20× = 2000%\n50× = 5000%
facc-infinite-resources-multiplier-fluid=유체 범주(예: 기본 유체 및 수정된 유체 범주)에서 무한 자원에 대한 승수를 결정합니다. 풍부함과 충전 금액에 영향을 미칩니다. 수정된 카테고리는 카테고리 이름에 "fluid"가 포함되어 있거나 리소스가 유동을 생성하는 경우 유동으로 처리됩니다.\n1× = 100%\n2× = 200%\n5× = 500%\n10× = 1000%\n20× = 2000%\n50× = 5000%
facc-enable-auto-resource-regeneration=활성화되면 무한 리소스 설정을 전환할 때(활성화 후 비활성화 시) 유한 리소스를 자동으로 재생성합니다. 관리 GUI의 "Regenerate Resources" 버튼을 통한 수동 재생성은 항상 가능합니다.\n[color=green]Map 설정: 게임을 다시 시작할 필요가 없습니다.[/color]\n@T7@@[font=default-bold]경고:[/font]@T10@@\n[color=orange]이 설정을 Infinite와 동시에 활성화하는 것은 권장되지 않습니다. 리소스.[/color]\n[color=red]최상의 결과를 얻으려면 둘 중 하나를 사용하십시오. 둘 다 활성화하지 마십시오.[/color]\n[color=green]두 가지를 모두 비활성화하는 것도 안전하고 지원됩니다.[/color]
facc-instant-mining-drills=모든 채굴 드릴의 채굴 속도를 엄청나게 증가시킵니다.
facc-instant-crafting-machines=제작 속도가 배가되어 레시피가 즉시 완료됩니다.
facc-enable-background-optimization=[font=default-bold]Default:[/font] OFF.\n[color=green]Map 설정: 게임 재시작 필요 없음.[/color]\n\n[color=green][font=default-bold]ON(최적화된 처리):[/font][/color]\n대규모 게임에서 정지를 방지하기 위해 백그라운드에서 무거운 작업을 처리합니다. 저장됩니다.\n@T19@@Pros:[/color] 더 부드러운 게임 플레이, 큰 지도에서는 더 안전합니다.\n[color=yellow]단점:[/color] 전체 완료에는 조금 더 오래 걸릴 수 있습니다.\n@T7@@[color=orange][font=default-bold]OFF(즉시 처리):[/font][/color]\n한 번에 모든 것을 즉시 실행합니다.\n@T27@@Pros:[/color] 작은 저장에서 가장 빠른 완료.\n[color=red]단점:[/color] 큰 저장에서 정지/버벅거림이 발생할 수 있습니다.
facc-stats-hud-enabled=실시간 게임플레이 통계가 포함된 경량 HUD를 표시합니다.
facc-stats-hud-single-line=활성화된 모든 HUD 센서를 하나의 수평선으로 표시합니다. 수직 누적선에 대해서는 비활성화합니다.
facc-stats-hud-adjust-for-fps-ups=Stats HUD: adjust for FPS/UPS indicator
facc-stats-hud-adjust-for-clock=Stats HUD: adjust for clock
facc-stats-hud-show-research-eta=현재 힘 연구에 남은 예상 시간을 표시합니다.
facc-stats-hud-show-coordinates=현재 X 및 Y 위치를 표시합니다.
facc-stats-hud-show-distance-from-point=아래에 구성된 사용자 지정 지점으로부터의 거리를 표시합니다.
facc-stats-hud-distance-origin-x=거리 센서가 사용하는 기준점 X 좌표입니다.
facc-stats-hud-distance-origin-y=거리 센서가 사용하는 기준점 Y 좌표입니다.
facc-stats-hud-show-evolution=표면의 현재 적 진화 요소를 표시합니다.
