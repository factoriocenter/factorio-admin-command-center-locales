facc-stats-hud-show-playtime=총 저장 플레이 시간을 표시합니다.
facc-stats-hud-show-playtime-days=활성화되면 플레이 시간이 일 + 시간으로 표시됩니다.
facc-stats-hud-show-daytime=현재 표면 시간과 날짜 수를 표시합니다.
facc-stats-hud-show-movement-speed=이동 속도를 표시합니다(도보 또는 차량 이용).
facc-stats-hud-show-player-max-speed=걸어서 갈 때 계산된 플레이어 최대 속도도 표시됩니다.
facc-stats-hud-show-vehicle-max-speed=차량에 탑승하면 계산된 차량 최대 속도도 표시됩니다.
facc-stats-hud-show-handcraft-timer=남은 수동 제작 대기열 시간을 표시합니다.
facc-stats-hud-show-vehicle-fuel=가능한 경우 차량 및 플랫폼 추진제의 예상 연료/에너지를 표시합니다.
facc-stats-hud-offset-preset-one-info=오른쪽 상단 게임 정보 줄이 1개만 표시되는 경우 사전 설정된 수직 오프셋입니다(오프셋 22 사용).
facc-stats-hud-offset-preset-two-infos=2개의 오른쪽 상단 게임 정보 줄이 표시되는 경우 사전 설정된 수직 오프셋입니다(오프셋 39 사용).
facc-stats-hud-offset-preset-three-infos=오른쪽 상단 게임 정보 줄 3개가 표시되는 경우 수직 오프셋이 미리 설정되어 있습니다(오프셋 60 사용).
facc-remove-electricity-usage=지원되는 전기 개체를 공허 에너지로 변환하여 전기 네트워크 없이 실행할 수 있습니다.\n@PH2@@시작 설정: 게임을 다시 시작해야 합니다.[/color]\n[color=orange]API에서 공허 에너지를 허용하는 프로토타입에만 적용됩니다.[/color]
facc-remove-fuel-usage=연료/유체 에너지를 사용하는 호환 엔티티를 void 에너지로 변환하여 연료 없이 작동하게 합니다.\n[color=yellow]시작 설정: 게임 재시작이 필요합니다.[/color]\n[color=orange]API에서 void 에너지를 허용하는 프로토타입에만 적용됩니다.[/color]
facc-ignore-recipe-inputs=모든 레시피의 재료 요구사항을 제거하여 입력 재료를 소비하지 않고 결과를 생산합니다.\n[color=yellow]시작 설정: 게임 재시작이 필요합니다.[/color]\n[color=orange]활성화하면 레시피 품질을 선택할 수 없습니다.[/color]\n[color=red]모드 레시피를 포함한 모든 레시피에 영향을 줍니다.[/color]

